name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: typecheck (mypy, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --extra dev
      - name: Mypy
        run: uv run mypy src/palmwtc

  test:
    name: test (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install (core + dev + ml)
        run: uv sync --extra dev --extra ml --python ${{ matrix.python }}
      - name: Pytest
        run: uv run pytest --cov=src/palmwtc --cov-report=term-missing

  docs-build:
    name: docs (jupyter-book)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install (docs extra)
        run: uv sync --extra docs --extra dev
      - name: Build docs
        run: uv run jupyter-book build docs/
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 14

  pipeline-smoke:
    name: pipeline smoke (synthetic sample)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install (core + ml)
        run: uv sync --extra ml
      - name: CLI smoke
        run: |
          uv run palmwtc --version
          uv run palmwtc info
          uv run palmwtc sample path
      - name: Pipeline end-to-end on bundled synthetic sample
        run: uv run palmwtc run
        timeout-minutes: 5
      - name: Verify expected artefacts
        run: |
          test -f src/palmwtc/data/sample/exports/digital_twin/01_chamber_cycles.csv
          test -f src/palmwtc/data/sample/exports/digital_twin/032_calibration_windows.csv
          ls -la src/palmwtc/data/sample/exports/digital_twin/
